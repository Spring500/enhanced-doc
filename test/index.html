## 8. ELK 布局对比案例

以下案例在 dagre 下容易出现边交叉、节点重叠等问题，ELK 的正交路由和高级交叉最小化应明显优于 dagre。

### 8.1 复杂交叉边（多对多依赖）

:::mermaid
flowchart TD
  A[前端] --> D[API 网关]
  A --> E[CDN]
  B[移动端] --> D
  B --> F[推送服务]
  C[桌面端] --> D
  C --> E
  D --> G[用户服务]
  D --> H[订单服务]
  D --> I[支付服务]
  E --> J[对象存储]
  F --> G
  G --> K[(数据库)]
  H --> K
  H --> I
  I --> L[第三方支付]
  I --> K
  J --> K
:::

### 8.2 嵌套子图（微服务架构）

:::mermaid
flowchart LR
  subgraph Client["客户端层"]
    direction TB
    Web[Web App]
    Mobile[Mobile App]
  end
  subgraph Gateway["网关层"]
    direction TB
    LB[负载均衡]
    Auth[认证中间件]
    LB --> Auth
  end
  subgraph Services["业务服务层"]
    direction TB
    subgraph Core["核心服务"]
      UserSvc[用户服务]
      OrderSvc[订单服务]
    end
    subgraph Support["支撑服务"]
      NotifySvc[通知服务]
      LogSvc[日志服务]
    end
    Core --> Support
  end
  subgraph Data["数据层"]
    direction TB
    PG[(PostgreSQL)]
    Redis[(Redis)]
    MQ[消息队列]
  end
  Client --> Gateway
  Gateway --> Services
  Services --> Data
:::

### 8.3 多分支汇聚（CI/CD 流水线）

:::mermaid
flowchart TD
  Trigger[代码推送] --> Lint[代码检查]
  Trigger --> Unit[单元测试]
  Trigger --> Build[构建镜像]
  Lint --> Gate{质量门禁}
  Unit --> Gate
  Build --> Gate
  Gate -->|通过| Deploy[部署 Staging]
  Gate -->|失败| Notify[通知开发者]
  Deploy --> Smoke[冒烟测试]
  Deploy --> Perf[性能测试]
  Deploy --> Security[安全扫描]
  Smoke --> Approve{人工审批}
  Perf --> Approve
  Security --> Approve
  Approve -->|批准| Prod[部署生产]
  Approve -->|拒绝| Rollback[回滚]
  Prod --> Monitor[监控告警]
  Rollback --> Notify
:::

## 15. HTML 内嵌控件

在 Markdown 中直接写 HTML。Pico CSS 自动美化表单元素：

<div style="display:flex;gap:16px;padding:8px;border-radius:12px;border:1px solid #444">
<div style="flex:1;padding:12px;border-right:1px solid #444">
  <strong>面板</strong>
  <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
    <button>按钮 A</button>
    <button class="secondary">按钮 B</button>
  </div>
  <hr>
  <label><input type="checkbox" checked> 选项</label>
</div>
<div style="flex:2;padding:12px">
  <label>输入框 <input value="示例"></label><br>
  <label>下拉框 <select><option>A</option><option>B</option></select></label><br>
  <label>滑块 <input type="range" value="50"></label>
</div>
</div>

> `style` 中不能使用 `var(--pico-*)`。`<script>` 不执行。
