## 10. 提示框

!!! Tip 提示
    使用 `!!! Tip` 创建提示框。正文缩进 4 空格，支持 **Markdown**。

!!! Warning 警告
    这是警告类提示。内容可包含 `代码` 和 **粗体**。

!!! Note
    无标题的提示框。

!!! Error 禁止
    错误/禁止提示。

## 12. HTML 内嵌控件

在 Markdown 中直接写 HTML。Pico CSS 自动美化表单元素：

<div style="display:flex;gap:16px;padding:8px;border-radius:12px;border:1px solid #444">
<div style="flex:1;padding:12px;border-right:1px solid #444">
  <strong>面板</strong>
  <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
    <button>按钮 A</button>
    <button class="secondary">按钮 B</button>
  </div>
  <hr>
  <label><input type="checkbox" checked> 选项</label>
</div>
<div style="flex:2;padding:12px">
  <label>输入框 <input value="示例"></label><br>
  <label>下拉框 <select><option>A</option><option>B</option></select></label><br>
  <label>滑块 <input type="range" value="50"></label>
</div>
</div>

> `style` 中不能使用 `var(--pico-*)`。`<script>` 不执行。

## 13. 多层级章节折叠测试

### 13.1 二级子章节

点击 h2/h3/h4 标题可折叠。本章节下方有两个三级章节。

#### 13.1.1 三级子章节 A

| 层级 | 折叠 |
|------|------|
| h2   | 支持 |
| h3   | 支持 |
| h4   | 支持 |

#### 13.1.2 三级子章节 B

与 13.1.1 同级，折叠互不干扰。本节包含一个图表：

:::chart
{
  "title": {"text": "章节内图表", "left": "center", "textStyle": {"color": "#c2c7d0"}},
  "xAxis": {"data": ["一", "二", "三"], "axisLabel": {"color": "#888"}},
  "yAxis": {"axisLabel": {"color": "#888"}},
  "series": [{"type": "bar", "data": [3, 7, 5], "itemStyle": {"color": "#6ab0f3"}}]
}
:::

折叠章节后再展开，图表应自动重绘。

### 13.2 另一个二级章节

独立的折叠区域，与 13.1 互不影响。
